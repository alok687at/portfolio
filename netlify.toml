[build]
  command = "corepack enable && pnpm install --no-frozen-lockfile && pnpm --filter @workspace/portfolio run build"
  publish = "artifacts/portfolio/dist/public"

[build.environment]
  NODE_VERSION = "20"
  BASE_PATH = "/"
  PNPM_VERSION = "9"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
